<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body {font-family: Arial, sans-serif;font-size: 16px;color: #333; 
            transition: background-color 0.3s;}
        .resume {width: 300px;margin: 50px auto;padding: 20px;border: 2px solid #555; 
            box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.5); 
            text-align: center;}
        .resume:hover {color: #d9534f;}
        .name-block {font-size: 24px;  font-weight: bold;  margin: 15px 0;  }
        input, button {margin-top: 10px;padding: 5px;width: 90%; }
    </style>
</head>
<body>
<div class="resume">
    <div class="name-block">
        <span id="first-name">Алексей</span> 
        <span id="last-name">Колтунов</span>
    </div> 
    <input type="text" id="name-input" placeholder="Введите новое имя">
    <input type="text" id="surname-input" placeholder="Введите новую фамилию">
    <button onclick="updateProfile()">Обновить данные</button>   
    <button onclick="randomBg()">Случайный фон</button>
</div>
<script>
    function updateProfile() {let newName = document.getElementById("name-input").value;
        let newSurname = document.getElementById("surname-input").value;
        if (newName !== "") {document.getElementById("first-name").innerText = newName;}
        if (newSurname !== "") {document.getElementById("last-name").innerText = newSurname;}}
    function randomBg() {let colors = ["#ff9999", "#99ccff", "#99ff99", "#ffff99", "#e6e6fa", "#ffffff"];
        let randomColor = colors[Math.floor(Math.random() * colors.length)];
        document.body.style.backgroundColor = randomColor; }
</script>
</body>
</html>
